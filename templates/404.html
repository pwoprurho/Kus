{% extends "base.html" %}

{% block title %}Signal Lost | 404{% endblock %}

{% block content %}
<style>
    .error-container {
        position: relative;
        z-index: 100;
        height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
    }

    .error-code {
        font-family: 'Garamond', serif;
        font-size: 8rem;
        font-weight: bold;
        background: -webkit-linear-gradient(#fff, #444);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
        margin-bottom: 20px;
    }

    .error-msg {
        font-family: 'Inter', sans-serif;
        font-size: 1.5rem;
        color: #0072ff;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    .error-desc {
        color: #888;
        max-width: 500px;
        margin-bottom: 40px;
    }

    .btn-home {
        border: 1px solid #333;
        padding: 12px 30px;
        color: #fff;
        border-radius: 4px;
        transition: all 0.3s;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
    }
    .btn-home:hover {
        background: #fff;
        color: #000;
        border-color: #fff;
    }
</style>

<div class="error-container fade-in">
    <div class="error-code">404</div>
    <div class="error-msg">Trajectory Not Found</div>
    <p class="error-desc">The coordinates you entered do not match any known sector in our system. Please recalibrate your navigation.</p>
    
    <a href="{{ url_for('public.home') }}" class="btn-home">Return to Base</a>
</div>
{% endblock %}
