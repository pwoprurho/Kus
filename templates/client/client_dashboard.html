{% extends "base.html" %}

{% block title %}Secure Client Terminal{% endblock %}

{% block content %}
<style>
    /* --- 1. GLOBAL OVERRIDES (Matches Admin Live Chat) --- */
    /* Hide public nav/footer to reveal the 3D orbit */
    header, footer, #chat-widget-container { display: none !important; }
    
    body {
        background-color: #000; /* Dark base for orbit contrast */
        overflow: hidden; /* Lock scrollbar for app-like feel */
        height: 100vh;
        width: 100vw;
    }

    /* --- 2. GLASS LAYOUT WRAPPER --- */
    .terminal-wrapper {
        position: relative;
        z-index: 10; /* Sits above the 3D orbit */
        display: grid;
        grid-template-columns: 300px 1fr; /* Sidebar | Main Chat */
        height: 100vh;
        width: 100vw;
        color: #e0e0e0;
        font-family: 'Inter', monospace;
    }

    /* --- 3. SIDEBAR (Status Panel) --- */
    .terminal-sidebar {
        background: rgba(10, 10, 10, 0.75); /* Transparent! */
        backdrop-filter: blur(12px);         /* Blurs the orbit behind it */
        -webkit-backdrop-filter: blur(12px);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Space out content */
        height: 100%;
        overflow: hidden;
    }

    .sidebar-header {
        padding: 25px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
    }

    .client-badge {
        padding: 12px;
        background: rgba(0, 114, 255, 0.15);
        border: 1px solid #0072ff;
        color: #0072ff;
        border-radius: 6px;
        text-align: center;
        font-size: 0.85rem;
        letter-spacing: 2px;
        font-weight: 600;
        margin-bottom: 25px;
        box-shadow: 0 0 15px rgba(0, 114, 255, 0.2);
    }

    .status-panel { padding: 0 20px; }
    .status-panel h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
    .status-item { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; font-size: 0.95rem; color: #ccc; }
    
    .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    .dot.green { background: #00ff88; color: #00ff88; }

    /* Footer Buttons */
    .sidebar-footer {
        padding: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
    }
    .btn-logout {
        display: block; width: 100%; text-align: center;
        padding: 12px; border: 1px solid rgba(255, 68, 68, 0.3);
        color: #ff6666; border-radius: 6px; text-decoration: none;
        transition: 0.2s; font-size: 0.9rem;
    }
    .btn-logout:hover { background: rgba(255, 68, 68, 0.1); color: #ff4444; border-color: #ff4444; }

    /* --- 4. MAIN CHAT AREA --- */
    .terminal-main {
        display: flex;
        flex-direction: column;
        /* Subtle gradient to let orbit shine through */
        background: radial-gradient(circle at center, rgba(17,17,17,0.8) 0%, rgba(0,0,0,0.9) 100%);
        position: relative;
        height: 100%;
        overflow: hidden;
    }

    .terminal-header {
        padding: 20px 40px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(10, 10, 10, 0.6);
        display: flex; justify-content: space-between; align-items: center;
        flex-shrink: 0;
    }
    .terminal-title { font-family: 'Garamond', serif; font-size: 1.6rem; color: #fff; }
    .terminal-subtitle { font-size: 0.9rem; color: #0072ff; display: flex; gap: 8px; align-items: center; }

    /* Messages Area */
    #messages-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 25px; /* Spacing between messages */
        scroll-behavior: smooth;
    }

    /* Chat Bubbles */
    .msg-bubble {
        max-width: 65%;
        padding: 18px 22px;
        line-height: 1.6;
        font-size: 1rem;
        position: relative;
        border-radius: 12px;
        word-wrap: break-word;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        /* Animation: Only runs once when appended */
        animation: fadeUp 0.3s forwards;
    }

    /* Client (Me) - Right Side */
    .msg-self {
        align-self: flex-end;
        background: rgba(0, 114, 255, 0.9); /* Semi-transparent blue */
        color: white;
        border-top-right-radius: 2px;
        box-shadow: 0 0 20px rgba(0, 114, 255, 0.2);
    }

    /* Admin (Officer) - Left Side */
    .msg-remote {
        align-self: flex-start;
        background: rgba(40, 40, 40, 0.8); /* Semi-transparent dark */
        border: 1px solid rgba(255,255,255,0.1);
        color: #e0e0e0;
        border-top-left-radius: 2px;
    }
    
    /* Officer Label */
    .msg-remote::before {
        content: 'OFFICER';
        position: absolute; top: -22px; left: 0;
        font-size: 0.7rem; color: #0072ff; font-weight: bold; letter-spacing: 1px;
    }

    /* Attachments */
    .attachment-view { margin-top: 10px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); background: #000; }
    .attachment-view img { max-width: 100%; max-height: 300px; display: block; }
    .file-download {
        display: inline-flex; align-items: center; gap: 8px;
        background: rgba(0,0,0,0.4); padding: 10px 15px;
        border-radius: 6px; color: #fff; text-decoration: none;
        margin-top: 8px; border: 1px solid rgba(255,255,255,0.2);
        transition: 0.2s;
    }
    .file-download:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

    /* Input Area */
    .input-wrapper {
        padding: 25px 40px;
        background: rgba(10, 10, 10, 0.9);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        gap: 15px;
        align-items: center;
        flex-shrink: 0;
    }

    .chat-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 16px;
        color: white;
        font-size: 1rem;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.3s;
    }
    .chat-input:focus { border-color: #0072ff; box-shadow: 0 0 15px rgba(0, 114, 255, 0.1); }

    .icon-btn {
        width: 50px; height: 50px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        color: #ccc; border-radius: 8px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.2rem; transition: 0.2s;
    }
    .icon-btn:hover { border-color: #0072ff; color: #0072ff; background: rgba(0,114,255,0.1); }
    .icon-btn.has-file { border-color: #00ff88; color: #00ff88; background: rgba(0,255,136,0.1); }

    .send-btn {
        width: 50px; height: 50px;
        background: #0072ff; color: white;
        border: none; border-radius: 8px; cursor: pointer;
        font-size: 1.2rem; transition: 0.2s;
    }
    .send-btn:hover { background: #005bb5; transform: scale(1.05); }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        .terminal-wrapper { grid-template-columns: 1fr; }
        .terminal-sidebar { display: none; } 
        .terminal-header { padding: 15px 20px; }
        .input-wrapper { padding: 20px; }
        .msg-bubble { max-width: 85%; }
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .empty-placeholder {
        height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666;
    }
</style>

<div class="terminal-wrapper">
    <aside class="terminal-sidebar">
        <div>
            <div class="sidebar-header">
                <div class="client-badge"><i class="fas fa-lock"></i> SECURE CHANNEL</div>
            </div>
            
            <div class="status-panel" style="margin-top: 30px;">
                <h3>System Status</h3>
                <div class="status-item"><span class="dot green"></span> Live Uplink</div>
                <div class="status-item"><span class="dot green"></span> AES-256 Encrypted</div>
                <div class="status-item"><span class="dot green"></span> Identity Verified</div>
            </div>
        </div>

        <div class="sidebar-footer">
            <a href="{{ url_for('auth.logout') }}" class="btn-logout"><i class="fas fa-power-off"></i> Disconnect</a>
        </div>
    </aside>

    <main class="terminal-main">
        <header class="terminal-header">
            <div class="terminal-title">Engineering Certainty Engine</div>
            <div class="terminal-subtitle"><i class="fas fa-shield-alt"></i> DIRECT EXECUTIVE LINE</div>
        </header>

        <div id="messages-area">
            <div class="empty-placeholder">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.5; color: #0072ff;"></i>
                <p>Initializing Secure Handshake...</p>
            </div>
        </div>

        <div class="input-wrapper">
            <input type="file" id="client-file" hidden>
            <button class="icon-btn" id="btn-attach" title="Attach Document"><i class="fas fa-paperclip"></i></button>
            
            <input type="text" id="client-input" class="chat-input" placeholder="Type your directive here... (Press Enter)" autocomplete="off">
            
            <button onclick="sendClientMessage()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </main>
</div>

<script>
    let pollingInterval = null;
    // CRITICAL: Set to track rendered IDs to prevent flashing/re-rendering
    let knownMessageIds = new Set();
    
    const fileInput = document.getElementById('client-file');
    const attachBtn = document.getElementById('btn-attach');
    const textInput = document.getElementById('client-input');
    const messagesArea = document.getElementById('messages-area');

    // 1. File Selection Logic
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            attachBtn.classList.add('has-file');
            textInput.placeholder = `File Attached: ${fileInput.files[0].name}. Press Send.`;
            textInput.focus();
        } else {
            attachBtn.classList.remove('has-file');
            textInput.placeholder = "Type your directive here... (Press Enter)";
        }
    });

    // 2. Sync Logic (APPEND ONLY - FIXES FLASHING)
    async function fetchMessages() {
        try {
            const res = await fetch('/api/client/chat/sync');
            const messages = await res.json();
            renderMessages(messages);
        } catch (e) {
            console.error("Sync Error:", e);
        }
    }

    function renderMessages(messages) {
        // Remove loading placeholder if messages exist
        if (messages.length > 0 || knownMessageIds.size > 0) {
            const empty = document.querySelector('.empty-placeholder');
            if (empty) empty.remove();
        }

        // Add Welcome Banner Once
        if (knownMessageIds.size === 0 && messages.length === 0) {
             const welcome = document.createElement('div');
             welcome.className = 'msg-bubble msg-remote'; // Remote = Officer style
             welcome.style.width = '100%';
             welcome.style.maxWidth = '600px';
             welcome.innerHTML = `Identity Verified. Secure channel established with Kusmus HQ.<br>An officer will be with you shortly.`;
             messagesArea.appendChild(welcome);
        }

        let hasNew = false;
        
        messages.forEach(msg => {
            // THE FIX: Check ID before appending
            if (!knownMessageIds.has(msg.id)) {
                appendMessage(msg);
                knownMessageIds.add(msg.id);
                hasNew = true;
            }
        });

        // Scroll ONLY if new messages were added
        if (hasNew) {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
    }

    function appendMessage(msg) {
        // Determine class: 'client' in DB is ME (Self), 'admin' is REMOTE (Officer)
        const cssClass = msg.sender_type === 'client' ? 'msg-self' : 'msg-remote';
        
        const div = document.createElement('div');
        div.className = `msg-bubble ${cssClass}`;
        
        let content = msg.message || "";
        
        // Handle Attachments
        if (msg.signed_attachment) {
            if (msg.attachment_type === 'image') {
                content += `<div class="attachment-view"><img src="${msg.signed_attachment}" alt="Secure Attachment" onload="this.parentElement.scrollIntoView({behavior:'smooth'})"></div>`;
            } else {
                content += `<a href="${msg.signed_attachment}" target="_blank" class="file-download"><i class="fas fa-file-download"></i> Download Secure Document</a>`;
            }
        }
        
        div.innerHTML = content;
        messagesArea.appendChild(div);
    }

    // 3. Send Message Logic
    async function sendClientMessage() {
        const text = textInput.value.trim();
        const file = fileInput.files[0];
        
        if (!text && !file) return;

        // Optimistic Append (Temp ID)
        const tempMsg = {
            id: 'temp-' + Date.now(),
            sender_type: 'client', // Self
            message: text || (file ? `[Uploading ${file.name}...]` : ''),
            signed_attachment: null
        };
        appendMessage(tempMsg);
        messagesArea.scrollTop = messagesArea.scrollHeight;

        try {
            const formData = new FormData();
            formData.append('message', text);
            if (file) formData.append('file', file);

            await fetch('/api/client/chat/send', {
                method: 'POST',
                body: formData
            });

            // Cleanup Inputs
            textInput.value = '';
            fileInput.value = '';
            attachBtn.classList.remove('has-file');
            textInput.placeholder = "Type your directive here... (Press Enter)";
            
            // Force Sync
            setTimeout(fetchMessages, 500); 
        } catch (e) {
            alert("Transmission Failed");
        }
    }

    // Enter Key to Send
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendClientMessage();
    });

    // Start Polling immediately
    setInterval(fetchMessages, 3000);
    fetchMessages();
</script>
{% endblock %}
