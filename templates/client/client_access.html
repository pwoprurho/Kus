{% extends "base.html" %}
{% block title %}Secure Access{% endblock %}
{% block content %}
<style>
    .access-wrapper { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    .access-card { background: rgba(5,5,5,0.9); padding: 50px; border: 1px solid #333; border-top: 3px solid #0072ff; width: 100%; max-width: 500px; text-align: center; }
    .form-control { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 15px; margin-bottom: 20px; font-family: 'Inter', monospace; }
    .btn-access { width: 100%; background: #0072ff; color: white; padding: 15px; border: none; font-weight: bold; cursor: pointer; }
</style>

<div class="access-wrapper fade-in">
    <div class="access-card">
        <h1 style="color:white; margin-bottom:10px;">Client Protocol Access</h1>
        <p style="color:#888; margin-bottom:30px;">Enter your credentials or Private Key to authenticate.</p>

        <form method="post">
            <input type="email" name="email" class="form-control" placeholder="Authorized Email" required>
            
            <input type="password" name="auth_input" class="form-control" placeholder="Password OR Private Key Token" required autocomplete="off">
            <small style="display:block; color:#555; text-align:left; margin-top:-15px; margin-bottom:20px;">
                <i class="fas fa-info-circle"></i> If you forgot your password, enter your 0x... Private Key here to reset it.
            </small>

            <button type="submit" class="btn-access">AUTHENTICATE</button>
        </form>
    </div>
</div>
{% endblock %}
