{% extends "base.html" %}
{% block title %}Initialize Protocol{% endblock %}
{% block content %}
<style>
    .access-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .access-card {
        background: rgba(5, 5, 5, 0.9);
        padding: 50px;
        border: 1px solid #333;
        border-top: 3px solid #00ff88;
        width: 100%;
        max-width: 500px;
        text-align: center;
    }

    .form-control {
        width: 100%;
        background: #111;
        border: 1px solid #444;
        color: white;
        padding: 15px;
        margin-bottom: 20px;
        font-family: 'Inter', monospace;
    }

    .btn-access {
        width: 100%;
        background: #00ff88;
        color: black;
        padding: 15px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }
</style>

<div class="access-wrapper fade-in">
    <div class="access-card">
        <div style="font-size: 3rem; color: #00ff88; margin-bottom: 20px;"><i class="fas fa-fingerprint"></i></div>
        <h1 style="color:white; margin-bottom:10px;">Establish Secure Credentials</h1>
        <p style="color:#888; margin-bottom:30px;">Identity Verified. Please set a password for daily access.</p>

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div style="position: relative;">
                <input type="password" id="password" name="password" class="form-control" placeholder="Set New Password"
                    required style="padding-right: 40px;">
                <button type="button" onclick="togglePasswordVisibility('password', 'toggleIcon1')"
                    style="position:absolute; right:15px; top:15px; background:none; border:none; color:#888; cursor:pointer; padding:0;">
                    <i class="fas fa-eye" id="toggleIcon1" title="Show Password"></i>
                </button>
            </div>
            <div style="position: relative;">
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                    placeholder="Confirm Password" required style="padding-right: 40px;">
                <button type="button" onclick="togglePasswordVisibility('confirm_password', 'toggleIcon2')"
                    style="position:absolute; right:15px; top:15px; background:none; border:none; color:#888; cursor:pointer; padding:0;">
                    <i class="fas fa-eye" id="toggleIcon2" title="Show Password"></i>
                </button>
            </div>
            <input type="tel" name="phone" class="form-control" placeholder="Contact Phone Number (Tactical Alerts)"
                value="{{ session.get('temp_client_phone') or '' }}" required>

            <button type="submit" class="btn-access">INITIALIZE ACCOUNT</button>
        </form>
    </div>
</div>

<script>
    function togglePasswordVisibility(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
