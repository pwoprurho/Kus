{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<style>
    .article-container {
        max-width: 800px;
        margin: 140px auto 100px;
        padding: 0 20px;
        position: relative;
        z-index: 10;
    }

    .article-header {
        margin-bottom: 50px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 30px;
    }

    .article-meta {
        color: #0072ff;
        font-family: 'Inter', monospace;
        font-size: 0.9rem;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .article-title {
        font-size: 2.5rem;
        color: #fff;
        line-height: 1.2;
    }

    /* Content Styling */
    .article-content {
        color: #d0d0d0;
        font-family: 'Georgia', serif;
        font-size: 1.15rem;
        line-height: 1.8;
    }

    .article-content h2 { margin-top: 40px; margin-bottom: 20px; color: #fff; font-family: 'Garamond', serif; }
    .article-content h3 { margin-top: 30px; margin-bottom: 15px; color: #eee; }
    .article-content p { margin-bottom: 25px; }
    .article-content ul, .article-content ol { margin-bottom: 25px; padding-left: 20px; }
    .article-content li { margin-bottom: 10px; }
    
    .article-content blockquote {
        border-left: 4px solid #0072ff;
        padding-left: 20px;
        margin: 30px 0;
        color: #fff;
        font-style: italic;
        background: rgba(255,255,255,0.05);
        padding: 20px;
    }

    .back-link {
        display: inline-block;
        margin-top: 50px;
        color: #888;
        font-size: 0.9rem;
        transition: color 0.3s;
    }
    .back-link:hover { color: #fff; }
</style>

<div class="article-container fade-in">
    <div class="article-header">
        <div class="article-meta">
            {{ post.published_at.split('T')[0] if post.published_at else 'Internal Briefing' }} | System Intelligence
        </div>
        <h1 class="article-title">{{ post.title }}</h1>
    </div>

    <div class="article-content">
        {{ post.content | safe }}
    </div>

    <a href="{{ url_for('public.blog') }}" class="back-link">&larr; Return to Intelligence Hub</a>
</div>
{% endblock %}
