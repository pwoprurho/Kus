<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics MVP | Kusmus AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #2ecc71;
            --bg: #050505;
            --glass: rgba(15, 15, 20, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: absolute;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .logo {
            font-weight: 700;
            letter-spacing: -0.05em;
            font-size: 1.5rem;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }

        .controls-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: auto;
        }

        .prompt-box {
            width: 80%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 10px 10px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .prompt-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            outline: none;
            font-family: inherit;
        }

        .prompt-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-generate {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loader.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(46, 204, 113, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #error-toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 68, 68, 0.9);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 0.9rem;
            z-index: 20;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 20px);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <div class="header">
            <div class="logo">KUSMUS PHYSICS MVP</div>
        </div>

        <div class="controls-wrapper">
            <div class="prompt-box">
                <input type="text" id="prompt-input"
                    placeholder="Describe an experiment (e.g., 'a ball falling from 10m')..." autocomplete="off">
                <button class="btn-generate" onclick="generate()">Generate</button>
            </div>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div style="color: var(--accent); font-weight: 700; letter-spacing: 0.1em;">GENERATING SIMULATION...</div>
    </div>

    <div id="error-toast"></div>

    <script>
        let currentRenderer = null;
        let animationId = null;

        document.getElementById('prompt-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generate();
        });

        async function generate() {
            const prompt = document.getElementById('prompt-input').value.trim();
            if (!prompt) return;

            const loader = document.getElementById('loader');
            const toast = document.getElementById('error-toast');

            loader.classList.add('active');
            toast.style.display = 'none';

            try {
                const response = await fetch('/api/physics/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: prompt, options: { show_code: true } })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to generate experiment');
                }

                executeCode(data.experiment.threejs_code);
                loader.classList.remove('active');

            } catch (err) {
                console.error(err);
                loader.classList.remove('active');
                toast.innerText = err.message;
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 5000);
            }
        }

        function executeCode(jsCode) {
            // Cleanup
            if (animationId) cancelAnimationFrame(animationId);
            if (currentRenderer) {
                currentRenderer.dispose();
                currentRenderer.forceContextLoss();
                currentRenderer.domElement.replaceWith(currentRenderer.domElement.cloneNode(true));
            }
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            try {
                let cleanCode = jsCode.trim();

                // Extract code from IIFE if present
                const iifeMatch = cleanCode.match(/^\(\s*function\s*\(\s*\)\s*\{([\s\S]*)\}\s*\)\s*\(\s*\)\s*;?$/);
                if (iifeMatch) {
                    cleanCode = iifeMatch[1];
                }

                // Wrap to inject dependencies and capture renderer/loop
                const wrapper = `
                    (function() {
                        const THREE = window.THREE;
                        const CANNON = window.CANNON;
                        const container = document.getElementById('canvas-container');
                        
                        // Override renderer creation to ensure it goes into our container
                        const OriginalRenderer = THREE.WebGLRenderer;
                        THREE.WebGLRenderer = function(params) {
                            const r = new OriginalRenderer({
                                ...params,
                                antialias: true,
                                preserveDrawingBuffer: true // Required for screenshots
                            });
                            r.setSize(window.innerWidth, window.innerHeight);
                            r.setPixelRatio(window.devicePixelRatio);
                            container.appendChild(r.domElement);
                            window._currentRenderer = r;
                            return r;
                        };

                        // Capture animation loop
                        const OriginalRAF = window.requestAnimationFrame;
                        window.requestAnimationFrame = function(cb) {
                            return OriginalRAF((time) => {
                                if (window._animationCanceled) return;
                                cb(time);
                            });
                        };

                        ${cleanCode}

                        // Revert overrides
                        THREE.WebGLRenderer = OriginalRenderer;
                    })()
                `;

                window._animationCanceled = true;
                setTimeout(() => {
                    window._animationCanceled = false;
                    eval(wrapper);
                    currentRenderer = window._currentRenderer;
                }, 100);

            } catch (err) {
                console.error('Execution Error:', err);
                alert('Execution Error: ' + err.message);
            }
        }

        window.addEventListener('resize', () => {
            if (currentRenderer) {
                currentRenderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>

</html>
