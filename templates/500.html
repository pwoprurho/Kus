{% extends "base.html" %}

{% block title %}System Error | 500{% endblock %}

{% block content %}
<style>
    .error-container {
        position: relative;
        z-index: 100;
        height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
    }

    .error-code {
        font-family: 'Garamond', serif;
        font-size: 8rem;
        font-weight: bold;
        color: #ff4444; /* Red for Critical Error */
        line-height: 1;
        margin-bottom: 20px;
        text-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
    }

    .error-msg {
        font-family: 'Inter', sans-serif;
        font-size: 1.5rem;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    .error-desc {
        color: #aaa;
        max-width: 500px;
        margin-bottom: 40px;
    }

    .btn-home {
        border: 1px solid #ff4444;
        padding: 12px 30px;
        color: #ff4444;
        border-radius: 4px;
        transition: all 0.3s;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
    }
    .btn-home:hover {
        background: #ff4444;
        color: #fff;
    }
</style>

<div class="error-container fade-in">
    <div class="error-code">500</div>
    <div class="error-msg">Internal System Failure</div>
    <p class="error-desc">An unexpected anomaly has occurred. Our engineering team has been automatically notified and is stabilizing the core.</p>
    
    <a href="{{ url_for('public.home') }}" class="btn-home">Emergency Reboot</a>
</div>
{% endblock %}
