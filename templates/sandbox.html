{% extends 'base.html' %}
{% block title %}Sentinel | Security Posture Sandbox{% endblock %}

{% block content %}
<style>
    /* --- HUD & LAYOUT --- */
    header, footer, #chat-widget-container { display: none !important; }
    body { background-color: #050505; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }

    /* --- THE 3D ORBITAL BACKGROUND --- */
    .orbit-container {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 600px; height: 600px;
        pointer-events: none; z-index: 1; opacity: 0.12;
    }
    .orbit-ring {
        position: absolute; border: 1px solid #0072ff;
        border-radius: 50%; width: 100%; height: 100%;
        animation: orbit 30s linear infinite;
        transform-style: preserve-3d;
    }
    @keyframes orbit { from { transform: rotateX(75deg) rotateZ(0deg); } to { transform: rotateX(75deg) rotateZ(360deg); } }

    .sandbox-container {
        position: relative; z-index: 10;
        display: grid; grid-template-columns: 280px 1fr 350px; 
        height: 100vh; width: 100vw;
    }

    /* --- SIDEBARS --- */
    .sidebar-left, .sidebar-right {
        background: rgba(10, 10, 10, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 40px 20px;
        display: flex; flex-direction: column;
        z-index: 20;
    }

    /* --- TERMINAL & SCROLLING --- */
    .main-terminal { display: flex; flex-direction: column; position: relative; background: #000; height: 100vh; }
    #chat-container {
        flex-grow: 1; overflow-y: auto;
        padding: 60px 30px 180px;
        display: flex; flex-direction: column; gap: 15px;
        scroll-behavior: smooth;
    }
    #chat-container::-webkit-scrollbar { width: 3px; }
    #chat-container::-webkit-scrollbar-thumb { background: #0072ff; }

    /* --- RAISED INPUT (8% Bottom) --- */
    .input-wrapper { position: absolute; bottom: 24%; width: 90%; left: 5%; z-index: 50; }
    .terminal-input-group {
        background: #111; border: 1px solid #333;
        padding: 12px 20px; border-radius: 8px;
        display: flex; align-items: center; gap: 12px;
    }
    .terminal-input-group input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; }

    /* --- STAT CARDS --- */
    .stat-card { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 4px; margin-bottom: 10px; }
    .vanguard-label { font-size: 0.6rem; color: #0072ff; letter-spacing: 1px; margin-bottom: 5px; }
    .vanguard-value { font-size: 1.8rem; font-weight: bold; color: #fff; }
    
    #activity-log { font-family: monospace; font-size: 0.7rem; color: #444; height: 300px; overflow: hidden; }
    
    .system-trigger-bubble {
        align-self: center; background: rgba(255, 0, 0, 0.05); border: 1px solid #ff4444;
        color: #ff4444; padding: 15px; font-family: monospace; font-size: 0.8rem; width: 90%;
    }
    .ai-bubble { align-self: flex-start; background: #111; border-left: 3px solid #0072ff; padding: 15px; max-width: 80%; }
    .user-bubble { align-self: flex-end; background: #0072ff; color: white; padding: 12px; border-radius: 8px; }
</style>

<div class="orbit-container"><div class="orbit-ring"></div><div class="orbit-ring"></div></div>

<div class="sandbox-container">
    <aside class="sidebar-left">
        <div class="stat-card">
            <div class="vanguard-label">VANGUARD SECURITY SCORE</div>
            <div id="v-score-val" class="vanguard-value">100</div>
            <div id="v-status" style="font-size: 0.6rem; color: #00ff88; margin-top: 5px;">OPTIMAL DEFENSE</div>
        </div>

        <div class="stat-card">
            <div class="vanguard-label">NODE LATENCY</div>
            <div id="latency-val" style="font-size: 1.2rem; font-weight: bold; color: #00ff88;">12ms</div>
        </div>

        <span style="font-size:0.6rem; color:#666; margin-top: 20px;">MODE SELECT</span>
        <select id="mood" onchange="currentMood = this.value" style="background:#000; color:white; border:1px solid #333; padding:8px; margin-top:5px; font-size:0.7rem;">
            <option value="proactive">PROACTIVE (Auto-Neutralize)</option>
            <option value="reactive">REACTIVE (Manual Only)</option>
        </select>
    </aside>

    <main class="main-terminal">
        <div id="chat-container">
            <div class="ai-bubble">Sentinel Defense Systems Online. Vanguard monitoring active.</div>
        </div>
        <div class="input-wrapper">
            <div class="terminal-input-group">
                <input type="text" id="sandbox-input" placeholder="Execute protocol..." onkeypress="if(event.key==='Enter') sendDirective()">
                <button onclick="sendDirective()" style="background:none; border:none; color:#0072ff; cursor:pointer;"><i class="fas fa-bolt"></i></button>
            </div>
        </div>
    </main>

    <aside class="sidebar-right">
        <span style="font-size:0.6rem; color:#0072ff; letter-spacing:2px;">THREAT TELEMETRY</span>
        <div id="activity-log" style="margin-top:15px;"></div>
    </aside>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const logContainer = document.getElementById('activity-log');
    let currentMood = 'proactive';
    let lock = false;
    let vanguardScore = 100;

    function updateVanguard(points) {
        vanguardScore = Math.max(10, Math.min(100, vanguardScore + points));
        const valDisplay = document.getElementById('v-score-val');
        const statusDisplay = document.getElementById('v-status');
        valDisplay.innerText = vanguardScore;

        if (vanguardScore >= 80) { valDisplay.style.color = "#00ff88"; statusDisplay.innerText = "EXCELLENT PROTECTION"; }
        else if (vanguardScore >= 50) { valDisplay.style.color = "#ffcc00"; statusDisplay.innerText = "ATTACKED: DEFENSE HOLDING"; }
        else { valDisplay.style.color = "#ff4444"; statusDisplay.innerText = "SYSTEM COMPROMISED"; }
    }

    function logInternal(msg, isCrit = false) {
        const entry = document.createElement('div');
        entry.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
        if (isCrit) {
            entry.style.color = "#ff4444";
            updateVanguard(-15); // Drop score on attack
        }
        logContainer.prepend(entry);

        if (isCrit && !lock) {
            lock = true;
            const reason = msg.includes("503") ? "O-RAN Signal Injection" : "Brute Force Attempt";
            
            if (currentMood === 'proactive') {
                appendMessage('system-trigger', `<strong>VANGUARD ALERT:</strong> ${reason} identified.<br>REASON: Packet anomaly detected on Node-7.<br>ACTION: Engaging Napalm-Auto-Remediation.`);
                setTimeout(() => {
                    sendDirective(`[SYSTEM_ALERT] ${msg}. Automated fix.`, true);
                    updateVanguard(10); // Recovery points for fixing
                }, 1500);
            } else {
                appendMessage('system-trigger', `<strong>VANGUARD ALERT:</strong> ${reason} identified.<br>REASON: Signature match on unauthorized IP.<br>STATUS: Awaiting operator intervention.`);
                lock = false;
            }
        }
    }

    // Telemetry Cycle
    setInterval(() => {
        const lat = Math.floor(Math.random() * 150);
        document.getElementById('latency-val').innerText = `${lat}ms`;
        document.getElementById('latency-val').style.color = lat > 100 ? "#ff4444" : "#00ff88";

        const normal = ["Heartbeat: OK", "SIEM: Stable", "Port 80: Clear"];
        if (Math.random() > 0.8) {
            logInternal("CRITICAL: Node-7 Connection Drop (503)", true);
        } else {
            logInternal(normal[Math.floor(Math.random()*normal.length)]);
        }
    }, 7000);

    async function sendDirective(customMsg = null, isAuto = false) {
        const input = document.getElementById('sandbox-input');
        const msg = customMsg || input.value.trim();
        if (!msg) return;
        if (!isAuto) appendMessage('user', msg);
        input.value = '';

        try {
            const res = await fetch('/api/sandbox/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ demo_id: 'sentinel_monitor', message: msg, history: [] })
            });
            const data = await res.json();
            if (data.response) appendMessage('ai', data.response);
        } catch (e) { console.error(e); }
        if (isAuto) lock = false;
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `bubble ${role}-bubble ${role === 'system-trigger' ? 'system-trigger-bubble' : ''}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>
{% endblock %}
