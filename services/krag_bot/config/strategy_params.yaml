# --- General Settings ---
bot_name: "Helix AI Trader"
trade_symbols:
  - BTCUSD # Example: BTCUSD, EURUSD. Use symbols present in your historical data.

# --- Timeframe Settings (for backtesting or multi-timeframe analysis) ---
low_timeframe_interval: 1h # e.g., 1m, 5m, 15m, 1h, 4h, 1d (matches your CSV interval)
# high_timeframe_interval: 4h # Optional: For higher timeframe analysis

# --- Strategy Parameters ---
# Entry Signal Strength Threshold (e.g., 2 means at least 2 out of 3 entry conditions must be met)
entry_signal_strength_threshold: 2

# EMA Periods (used for trend identification)
ema_periods:
  short: 20
  long: 50
  # You can add more if needed, e.g., 'very_long': 200

# RSI (Relative Strength Index)
rsi_period: 14 # Default period for RSI
rsi_oversold: 30
rsi_overbought: 70

# ADX (Average Directional Index)
adx_period: 14
adx_threshold: 25 # Typical threshold for strong trend

# MACD (Moving Average Convergence Divergence)
macd_fast_period: 12
macd_slow_period: 26
macd_signal_period: 9

# ATR (Average True Range)
atr_period: 14 # Default period for ATR

# Volume Average
volume_avg_period: 20 # Period for simple moving average of volume

# CRSI (Composite RSI) - Placeholder parameters, actual calculation needs to be defined
crsi_rsi_price_period: 14
crsi_up_down_length_period: 20
crsi_percent_rank_period: 50
# CRSI signal thresholds
crsi_oversold: 20
crsi_overbought: 80

# --- Trade Management Parameters ---
# Take Profit (TP) and Stop Loss (SL) Calculation
# You can define these as percentages, multiples of ATR, or fixed points
tp_atr_multiple: 1.5 # TP is 1.5 * ATR
sl_atr_multiple: 1.0 # SL is 1.0 * ATR

# Trailing Stop (optional)
# trailing_stop_atr_multiple: 0.5 # Trailing stop moves every 0.5 * ATR
# trailing_stop_step_percentage: 0.001 # Trailing stop moves when price moves by this percentage

# Position Sizing (e.g., risk a fixed percentage of equity per trade)
risk_per_trade_percent: 0.01 # Risk 1% of equity per trade

# --- Backtesting Specific Settings ---
backtest_start_date: '2025-00-27 12:59:59' # Optional: Slice data for backtesting start
backtest_end_date: '2025-03-27 12:59:59'   # Optional: Slice data for backtesting end

# --- Live Trading Specific Settings (Optional, consider environment variables for sensitive data) ---
mt5_login: "5037207481"
mt5_password: "MQIjuYjLh"
mt5_server: 'MetaQuotes-Demo' # e.g., 'ICMarkets-Demo', 'MetaQuotes-Demo'
live_trade_interval_seconds: 90 # How often to check for new bars/signals in seconds (e.g., 60 for 1-minute bars)

# --- AI Integration Settings ---
ai_enabled: true
ai_confidence_threshold: 70
ai_model_name: "gemini-2.5-flash"

# --- News Oracle Settings ---
news_rss_feeds:
  - "https://cointelegraph.com/rss"
  - "https://feeds.feedburner.com/CoinDesk"
  - "https://www.investing.com/rss/news.rss"

# --- Compliance Guardian Settings ---
# ai_confidence_threshold is already defined above
blacklisted_symbols:
  - "LUNA"
  - "FTT"
allowed_trading_hours: "00:00-23:59"